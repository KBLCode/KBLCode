<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" fill="none" role="img" aria-label="Stack">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d11" />
      <stop offset="1" stop-color="#090909" />
    </linearGradient>
  </defs>
  <rect width="1200" height="200" rx="14" fill="url(#sbg)" />
  <rect x="0.5" y="0.5" width="1199" height="199" rx="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" />

  <text x="40" y="46" font-family="ui-monospace,Menlo,monospace" font-size="12" letter-spacing="3" fill="#6a4f3c">STACK</text>
  <rect x="40" y="58" width="22" height="2" fill="#e0905a" />

  <!-- primary languages, weighted larger -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <text x="40"  y="118" font-size="34" font-weight="700" letter-spacing="-1" fill="#fafafa">Rust</text>
    <text x="40"  y="148" font-size="13" fill="#7d8288" font-family="ui-monospace,Menlo,monospace">systems · cli · daemons</text>

    <text x="300" y="118" font-size="34" font-weight="700" letter-spacing="-1" fill="#fafafa">TypeScript</text>
    <text x="300" y="148" font-size="13" fill="#7d8288" font-family="ui-monospace,Menlo,monospace">product · web · tooling</text>
  </g>

  <line x1="620" y1="86" x2="620" y2="160" stroke="#ffffff" stroke-opacity="0.07" />

  <!-- supporting tools, mono chips -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#aeb4ba">
    <text x="668" y="96">React</text>
    <text x="668" y="124">Next.js</text>
    <text x="668" y="152">Astro</text>

    <text x="800" y="96">Tauri</text>
    <text x="800" y="124">Node</text>
    <text x="800" y="152">Tailwind</text>

    <text x="930" y="96">WebGL</text>
    <text x="930" y="124">Python</text>
    <text x="930" y="152">Shell</text>

    <text x="1064" y="96">Git</text>
    <text x="1064" y="124">SQL</text>
    <text x="1064" y="152">Linux</text>
  </g>
</svg>
