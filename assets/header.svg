<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="KBLCode — swe // rust + typescript // systems to product">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0b0f" />
      <stop offset="1" stop-color="#070708" />
    </linearGradient>
    <radialGradient id="emberA" cx="14%" cy="0%" r="55%">
      <stop offset="0" stop-color="#e0905a" stop-opacity="0.22" />
      <stop offset="0.55" stop-color="#e0905a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="emberB" cx="92%" cy="115%" r="55%">
      <stop offset="0" stop-color="#b9764a" stop-opacity="0.14" />
      <stop offset="0.6" stop-color="#b9764a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0905a" />
      <stop offset="1" stop-color="#e0905a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0" />
      <stop offset="0.5" stop-color="#fafafa" stop-opacity="0.55" />
      <stop offset="1" stop-color="#fafafa" stop-opacity="0" />
    </linearGradient>
    <mask id="wordmask">
      <rect width="1200" height="320" fill="#000" />
      <text x="80" y="168" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="94" font-weight="700" letter-spacing="-4" fill="#fff">KBLCode</text>
    </mask>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)" />
  <rect width="1200" height="320" fill="url(#emberA)" />
  <rect width="1200" height="320" fill="url(#emberB)" />

  <!-- faint forge grid -->
  <g stroke="#ffffff" stroke-opacity="0.025">
    <line x1="0" y1="80" x2="1200" y2="80" />
    <line x1="0" y1="160" x2="1200" y2="160" />
    <line x1="0" y1="240" x2="1200" y2="240" />
  </g>

  <!-- wordmark -->
  <text x="80" y="168" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="94" font-weight="700" letter-spacing="-4" fill="#fafafa">KBLCode</text>

  <!-- shimmer sweep across the wordmark -->
  <g mask="url(#wordmask)">
    <rect x="-400" y="0" width="320" height="320" fill="url(#shimmer)">
      <animate attributeName="x" values="-400;1280" dur="5.5s" begin="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- subtitle, tokenised -->
  <text x="84" y="214" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="22" fill="#8b9096">
    <tspan fill="#c7ccd1">swe</tspan><tspan fill="#5a5f66">  //  </tspan><tspan fill="#e0905a">rust</tspan><tspan fill="#5a5f66"> + </tspan><tspan fill="#e0905a">typescript</tspan><tspan fill="#5a5f66">  //  </tspan><tspan fill="#c7ccd1">systems → product</tspan>
  </text>

  <!-- gradient rule with pulsing ember node -->
  <rect x="84" y="234" width="300" height="2" rx="1" fill="url(#rule)" />
  <circle cx="84" cy="235" r="3.2" fill="#e0905a">
    <animate attributeName="r" values="3.2;4.6;3.2" dur="2.4s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite" />
  </circle>

  <!-- corner coordinate, editorial detail -->
  <text x="1120" y="56" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" letter-spacing="1" fill="#4a4f55">52.4°N / 1.9°W</text>
</svg>
