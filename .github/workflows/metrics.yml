name: metrics

# Regenerate profile SVGs from LIVE public GitHub data, daily.
# Commits only when an asset actually changes — no empty churn.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate.mjs"
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: generate assets
        run: node scripts/generate.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git add assets
            git commit -m "chore(metrics): refresh profile stats"
            git push
          else
            echo "no metric changes"
          fi
